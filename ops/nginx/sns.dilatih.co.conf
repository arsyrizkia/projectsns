# ProjectSNS — nginx vhost
# Install: copy to /etc/nginx/sites-available/sns.dilatih.co and symlink into
# sites-enabled (NOTE: on this droplet sites-enabled/dilatih.co is a real file,
# not a symlink — keep this one a symlink and keep the tree clean).
# TLS: certbot --nginx -d sns.dilatih.co (or Cloudflare origin cert like dilatih.co).

# rate-limit auth-sensitive endpoints
limit_req_zone $binary_remote_addr zone=sns_oauth:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name sns.dilatih.co;

    client_max_body_size 512m;  # video uploads

    location /api/oauth/ {
        limit_req zone=sns_oauth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3100;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
